<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Un detalle romántico con flores amarillas y música">
    <title>🌻 Flores Amarillas · Amor eterno</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌻%3C/text%3E%3C/svg%3E">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(145deg, #fdf8f0 0%, #f6efe1 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
            margin: 20px;
            background: rgba(255, 250, 240, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            padding: 20px;
            z-index: 10;
            border: 1px solid rgba(210, 180, 140, 0.2);
        }

        /* Sección de texto */
        .text-section {
            flex: 1.2;
            min-width: 300px;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #3e2e21;
        }

        .text-section h1 {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 25px;
            color: #5a3e28;
            letter-spacing: -0.5px;
            border-left: 5px solid #e6b422;
            padding-left: 20px;
        }

        .love-quote {
            font-size: 1.3rem;
            margin: 15px 0;
            line-height: 1.7;
            font-style: italic;
            color: #4d3a28;
        }

        .signature {
            text-align: right;
            margin-top: 20px;
            font-style: normal;
            font-weight: bold;
            font-size: 1.2rem;
            color: #8B4513;
        }

        /* === TIMER MEJORADO === */
        .timer-container {
            margin-top: 45px;
            padding-top: 20px;
            border-top: 2px dashed #d4b68a;
        }

        .timer-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7a5a3a;
            margin-bottom: 14px;
        }

        .timer-start-date {
            font-size: 0.82rem;
            color: #a08060;
            margin-bottom: 14px;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        #timer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-end;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f3e9d2;
            padding: 10px 13px 8px;
            border-radius: 14px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.03), 0 4px 8px rgba(139,69,19,0.07);
            border: 1px solid #e6c9a8;
            min-width: 52px;
            transition: transform 0.15s ease;
        }

        .time-unit:hover {
            transform: translateY(-2px);
        }

        .time-value {
            font-size: 1.55rem;
            font-weight: 700;
            color: #8B4513;
            line-height: 1;
            min-width: 2ch;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .time-lbl {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a07050;
            margin-top: 4px;
            font-style: normal;
        }

        .time-sep {
            font-size: 1.4rem;
            color: #d4a870;
            padding-bottom: 10px;
            font-weight: 300;
            align-self: flex-end;
        }

        /* Controles */
        .controls {
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .btn {
            background: #e6d5b8;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            color: #4a2e1a;
            cursor: pointer;
            box-shadow: 0 5px 0 #b89a7a;
            transition: all 0.1s ease;
            border: 1px solid #c9af91;
            font-weight: bold;
            backdrop-filter: blur(5px);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #f0e0c8;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #b89a7a;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b89a7a;
        }

        /* Árbol */
        .tree-section {
            flex: 1;
            min-width: 300px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 550px;
        }

        .trunk {
            width: 64px;
            height: 180px;
            position: absolute;
            bottom: 0;
            left: 55%;
            transform: translateX(-50%);
            z-index: 2;
            /* Veta de madera + degradado lateral para volumen */
            background:
                repeating-linear-gradient(
                    179deg,
                    transparent 0px, transparent 9px,
                    rgba(0,0,0,0.025) 9px, rgba(0,0,0,0.025) 10px
                ),
                linear-gradient(to right,
                    #2e1608 0%,
                    #6b4226 14%,
                    #8c5c38 40%,
                    #7a4e2c 70%,
                    #5a3520 88%,
                    #2e1608 100%
                );
            /* Tronco más ancho en la base, se estrecha hacia arriba y luego se abre levemente
               para encajar con la copa de flores */
            clip-path: polygon(
                19% 0%,
                81% 0%,
                85% 28%,
                91% 60%,
                97% 85%,
                100% 100%,
                0%  100%,
                3%  85%,
                9%  60%,
                15% 28%
            );
            box-shadow: 3px 10px 22px rgba(0,0,0,0.22);
        }

        /* Raíces sutiles a ambos lados de la base */
        .trunk::before,
        .trunk::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 18px;
            height: 28px;
            background: linear-gradient(to bottom, #5a3520, #3a2010);
            border-radius: 0 0 50% 50%;
        }
        .trunk::before { left: -10px; transform: rotate(-12deg); transform-origin: bottom center; }
        .trunk::after  { right: -10px; transform: rotate(12deg);  transform-origin: bottom center; }

        .heart-tree {
            position: absolute;
            bottom: 130px;
            width: 400px;
            height: 400px;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.05));
            z-index: 3;
        }

        /* Flores del árbol con animación de balanceo */
        .flower {
            position: absolute;
            user-select: none;
            pointer-events: none;
            animation: sway 5s infinite ease-in-out alternate;
            text-shadow: 2px 4px 6px rgba(0,0,0,0.05);
            will-change: transform;
        }

        @keyframes sway {
            0%   { transform: translateX(-2px) rotate(-2deg); }
            25%  { transform: translateX(3px) rotate(1deg); }
            50%  { transform: translateX(-1px) rotate(-1.5deg); }
            75%  { transform: translateX(2px) rotate(0.5deg); }
            100% { transform: translateX(-3px) rotate(-2.5deg); }
        }

        /* Flores cayendo */
        .falling-flower {
            position: fixed;
            top: -60px;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 5;
            opacity: 0.85;
            text-shadow: 0 0 5px rgba(255,240,150,0.7);
            will-change: transform;
        }

        @keyframes fall {
            0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
            80%  { opacity: 0.9; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.3; }
        }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .container {
                flex-direction: column;
                margin: 10px;
                padding: 15px;
            }
            .tree-section {
                height: 450px;
                margin-top: 10px;
            }
            .heart-tree {
                transform: scale(0.85);
                bottom: 120px;
            }
            .text-section h1 { font-size: 1.6rem; }
            #timer { gap: 6px; }
            .time-value { font-size: 1.25rem; }
            .time-unit { padding: 8px 10px 6px; min-width: 44px; }
        }

        @media (max-width: 480px) {
            .heart-tree {
                transform: scale(0.7);
                bottom: 100px;
            }
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="text-section">
        <h1>🌻 Flores Amarillas<br>para el amor de mi vida</h1>
        <div class="love-quote">
            <p>✨ Si pudiera elegir un lugar seguro, sería a tu lado.</p>
            <p>✨ Cuanto más tiempo estoy contigo, más te amo.</p>
        </div>
        <div class="signature">— I Love You</div>

        <div class="timer-container">
            <div class="timer-label">⏳ Llevamos juntos...</div>
            <div class="timer-start-date">Desde el 26 de octubre de 2025 💛</div>
            <div id="timer">Cargando...</div>
        </div>

        <div class="controls">
            <button class="btn" id="toggleRainBtn" aria-label="Pausar o reanudar lluvia de flores">⏸️ Pausar lluvia</button>
            <button class="btn" id="toggleMusicBtn" aria-label="Reproducir o pausar música de fondo">▶️ Música</button>
            <span class="visually-hidden">Controles de animación y música</span>
        </div>
    </div>

    <div class="tree-section">
        <div class="heart-tree" id="tree-crown" role="img" aria-label="Árbol en forma de corazón con flores amarillas"></div>
        <div class="trunk"></div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ============================================================
        // 🎵 CONFIGURACIÓN DE MÚSICA
        // ============================================================
        const MUSIC_SOURCE = '';
        
        const LISTA_REPRODUCCION = [
            './cancion1.mp3',
            './cancion2.mp3',
            './cancion3.mp3',
            './cancion4.mp3',
            './cancion5.mp3',
            './cancion6.mp3',
            './cancion7.mp3'
        ];

        /* ---------- CONSTANTES GENERALES ---------- */
        // Fecha de inicio: 26 de octubre de 2025
        const START_DATE = new Date(2025, 9, 26, 0, 0, 0); // mes 9 = octubre (0-indexado)
        const EMOJIS_FLORES = ['🌻', '🌻', '🌼', '💛', '🌟'];

        /* ---------- CRONÓMETRO EN TIEMPO REAL ---------- */
        const timerElement = document.getElementById('timer');

        function getMonthsAndDays(start, now) {
            let months = (now.getFullYear() - start.getFullYear()) * 12
                       + (now.getMonth() - start.getMonth());
            let days = now.getDate() - start.getDate();

            if (days < 0) {
                months--;
                // Días del mes anterior
                const prevMonthEnd = new Date(now.getFullYear(), now.getMonth(), 0);
                days += prevMonthEnd.getDate();
            }
            return { months, days };
        }

        function pad(n) {
            return n.toString().padStart(2, '0');
        }

        function makeUnit(value, label) {
            return `<div class="time-unit">
                        <span class="time-value">${value}</span>
                        <span class="time-lbl">${label}</span>
                    </div>`;
        }

        function updateTimer() {
            const now = new Date();
            const diff = now - START_DATE;

            if (diff < 0) {
                timerElement.innerHTML = '<span style="color:#8B4513;font-style:italic">✨ El amor está por comenzar...</span>';
                return;
            }

            const { months, days } = getMonthsAndDays(START_DATE, now);
            const totalSecs = Math.floor(diff / 1000);
            const secs    = totalSecs % 60;
            const mins    = Math.floor(totalSecs / 60) % 60;
            const hours   = Math.floor(totalSecs / 3600) % 24;

            timerElement.innerHTML =
                makeUnit(months,    'meses')  +
                '<span class="time-sep">·</span>' +
                makeUnit(days,      'días')   +
                '<span class="time-sep">·</span>' +
                makeUnit(pad(hours), 'horas') +
                makeUnit(pad(mins),  'min')   +
                makeUnit(pad(secs),  'seg');
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        /* ---------- CORAZÓN DE FLORES (INTERIOR RELLENO) ---------- */
        const treeCrown = document.getElementById('tree-crown');

        function createHeartFlowers() {
            const count     = 540;
            const centerX   = 200;
            const centerY   = 205;
            const scale     = 11.5;

            treeCrown.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const t = Math.random() * 2 * Math.PI;

                // sqrt(random) da distribución uniforme sobre el ÁREA del corazón
                // (evita concentración en el centro y el "huevo" vacío en el medio)
                const r = Math.sqrt(Math.random()) * 1.04;

                const rawX =  16 * Math.pow(Math.sin(t), 3) * r;
                const rawY = -(13 * Math.cos(t)
                              - 5 * Math.cos(2 * t)
                              - 2 * Math.cos(3 * t)
                              -     Math.cos(4 * t)) * r;

                const x = centerX + rawX * scale;
                const y = centerY + rawY * scale;

                // Descartar puntos fuera del SVG
                if (x < 5 || x > 395 || y < 5 || y > 395) continue;

                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.textContent = EMOJIS_FLORES[Math.floor(Math.random() * EMOJIS_FLORES.length)];
                flower.style.left   = `${x}px`;
                flower.style.top    = `${y}px`;
                flower.style.fontSize = `${12 + Math.random() * 22}px`;
                flower.style.animationDuration = `${3.5 + Math.random() * 6}s`;
                flower.style.animationDelay    = `${Math.random() * 4}s`;
                flower.style.filter = `hue-rotate(${Math.random() * 20 - 10}deg)`;
                flower.style.zIndex = Math.floor(Math.random() * 5).toString();

                treeCrown.appendChild(flower);
            }
        }
        createHeartFlowers();

        /* ---------- LLUVIA DE FLORES ---------- */
        const body = document.body;
        let rainActive = true;
        let fallInterval;
        const MAX_FALLING = 45;
        let currentFalling = 0;

        function createFallingFlower() {
            if (!rainActive || currentFalling >= MAX_FALLING) return;

            const flower = document.createElement('div');
            flower.className = 'falling-flower';
            flower.textContent = EMOJIS_FLORES[Math.floor(Math.random() * EMOJIS_FLORES.length)];
            flower.style.left = `${Math.random() * 100}vw`;
            flower.style.fontSize = `${14 + Math.random() * 28}px`;
            const duration = 5 + Math.random() * 8;
            flower.style.animationDuration = `${duration}s`;
            flower.style.animationDelay    = `${Math.random() * -10}s`;
            flower.style.transform = `rotate(${Math.random() * 360}deg)`;

            body.appendChild(flower);
            currentFalling++;

            const timeoutId = setTimeout(() => {
                if (flower.parentNode) {
                    flower.remove();
                    currentFalling--;
                }
            }, duration * 1000);
            flower.dataset.timeoutId = timeoutId;
        }

        function startRain(intervalMs = 380) {
            if (fallInterval) clearInterval(fallInterval);
            fallInterval = setInterval(createFallingFlower, intervalMs);
        }

        function stopRain() {
            if (fallInterval) { clearInterval(fallInterval); fallInterval = null; }
            document.querySelectorAll('.falling-flower').forEach(f => {
                if (f.dataset.timeoutId) clearTimeout(Number(f.dataset.timeoutId));
                f.remove();
            });
            currentFalling = 0;
        }

        const toggleRainBtn = document.getElementById('toggleRainBtn');
        function toggleRain() {
            rainActive = !rainActive;
            if (rainActive) {
                startRain(380);
                toggleRainBtn.innerHTML = '⏸️ Pausar lluvia';
            } else {
                stopRain();
                toggleRainBtn.innerHTML = '▶️ Reanudar lluvia';
            }
        }
        toggleRainBtn.addEventListener('click', toggleRain);
        startRain(380);

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && rainActive) {
                stopRain();
            } else if (!document.hidden && rainActive) {
                startRain(380);
            }
        });

        /* ============================================================
           🎵 CONTROL DE MÚSICA
        ============================================================ */
        let audioElement = null;
        const toggleMusicBtn = document.getElementById('toggleMusicBtn');
        let musicPlaying = false;

        function obtenerFuenteMusica() {
            if (typeof LISTA_REPRODUCCION !== 'undefined' && LISTA_REPRODUCCION.length > 0) {
                return LISTA_REPRODUCCION[Math.floor(Math.random() * LISTA_REPRODUCCION.length)];
            }
            if (MUSIC_SOURCE && MUSIC_SOURCE.trim() !== '') return MUSIC_SOURCE;
            return null;
        }

        function toggleMusic() {
            const fuente = obtenerFuenteMusica();
            if (!fuente) {
                alert('🎵 No se ha configurado ninguna canción.\n\n👉 Abre el código y busca MUSIC_SOURCE para agregar tu música.');
                return;
            }
            if (!audioElement) {
                audioElement = new Audio(fuente);
                audioElement.loop = true;
                audioElement.volume = 0.5;
            }
            if (musicPlaying) {
                audioElement.pause();
                toggleMusicBtn.innerHTML = '▶️ Música';
                musicPlaying = false;
            } else {
                audioElement.play().then(() => {
                    musicPlaying = true;
                    toggleMusicBtn.innerHTML = '🎵 Pausar música';
                }).catch(err => {
                    console.warn('No se pudo reproducir la música:', err);
                    alert('⚠️ No se pudo reproducir el audio. Verifica la ruta o el formato.');
                });
            }
        }
        toggleMusicBtn.addEventListener('click', toggleMusic);

        console.log('%c🌻 Para el amor de mi vida 🌻', 'font-size:16px; background:#f9e076; color:#5a3e28; padding:4px; border-radius:20px;');
    })();
</script>
</body>
</html>
