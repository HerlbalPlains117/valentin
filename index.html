<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Feliz San Valentín</title>
  <style>
    /* Reset básico */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /*************************************************************
     * TÍTULO SUPERIOR
     *************************************************************/
    #title {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      background: linear-gradient(45deg, #ff6b81, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      animation: pulse 2s infinite;
      z-index: 10;
    }
    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }

    /*************************************************************
     * LINK EN EL CENTRO DEL CORAZÓN
     *************************************************************/
    #center-link {
      position: absolute;
      /* Ajuste para centrarlo en el corazón elevado 80px */
      top: calc(50% - 80px);
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 12; /* Por encima del canvas y el corazón */
      text-decoration: none;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      transition: transform 0.2s;
      cursor: pointer;
    }
    #center-link:hover {
      transform: translate(-50%, -50%) scale(1.1);
    }

    /* Mensaje "te amo" (oculto por defecto) */
    #love-message {
      position: absolute;
      /* Mismo ajuste que el link, para que aparezca en la misma posición */
      top: calc(50% - 80px);
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 60px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      z-index: 13; /* Encima del link */
      display: none; /* Oculto inicialmente */
    }

    /*************************************************************
     * CANVAS PARA CORAZÓN CENTRAL Y LLUVIA DE CORAZONES
     *************************************************************/
    canvas {
      display: block;
    }

    /*************************************************************
     * REPRODUCTOR DE MÚSICA MINIMALISTA (TONOS MORADOS)
     *************************************************************/
    #music-player {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 500px;
      background: linear-gradient(135deg, #2c2c54, #3f3f6a); /* Tonos púrpura/violáceos */
      color: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      padding: 20px;
      z-index: 10;
    }
    /* Encabezado del reproductor: nombre de la canción, artista y botón "like" */
    #player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    #track-info {
      display: flex;
      flex-direction: column;
    }
    #song-name {
      font-size: 16px;
      font-weight: bold;
    }
    #artist-name {
      font-size: 14px;
      color: #ccc;
    }
    #like-btn {
      font-size: 20px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s;
    }
    #like-btn:hover {
      transform: scale(1.2);
    }
    .liked {
      color: #e74c3c; /* Corazón rojo cuando está “like” */
    }
    /* Barra de progreso y tiempos */
    #progress-container {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    #current-time,
    #duration {
      width: 40px;
      text-align: center;
      font-size: 12px;
      color: #eee;
    }
    #progress-bar {
      flex: 1;
      margin: 0 8px;
      -webkit-appearance: none;
      height: 4px;
      background: #888;
      border-radius: 2px;
      cursor: pointer;
    }
    #progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      margin-top: -5px;
    }
    #progress-bar::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
    }
    /* Controles inferiores (Shuffle, Prev, Play/Pause, Next, Repeat) */
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }
    #controls button {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s;
      color: #fff;
    }
    #controls button:hover {
      transform: scale(1.2);
    }
    .active-control {
      color: #ff6b81; /* resaltar un botón activo */
    }
  </style>
</head>
<body>
  <!-- Título animado -->
  <h1 id="title">Feliz San valentin mi reina hermosa</h1>

  <!-- Mensaje "te amo" oculto inicialmente -->
  <div id="love-message">te amo</div>

  <!-- Link en el centro del corazón (solo texto) -->
  <a
    id="center-link"
    href="https://drive.google.com/file/d/1VDDwF6b1R9_DQBSFvz1VdVagVmVbHYie/view?usp=drive_link"
    target="_blank"
    >Clica aquí &lt;3</a
  >

  <!-- Canvas para el gran corazón palpitante y lluvia de corazones -->
  <canvas id="canvas"></canvas>

  <!-- Reproductor de música -->
  <div id="music-player">
    <!-- Encabezado: título de la pista, artista, y botón "like" -->
    <div id="player-header">
      <div id="track-info">
        <div id="song-name">Canción</div>
        <div id="artist-name">Artista</div>
      </div>
      <div id="like-btn">♥</div>
    </div>

    <!-- Barra de progreso y tiempos -->
    <div id="progress-container">
      <span id="current-time">0:00</span>
      <input type="range" id="progress-bar" min="0" max="100" value="0" />
      <span id="duration">0:00</span>
    </div>

    <!-- Controles: Shuffle, Prev, Play/Pause, Next, Repeat -->
    <div id="controls">
      <button id="shuffle">⇆</button>
      <button id="prev">⏮</button>
      <button id="play-pause">▶</button>
      <button id="next">⏭</button>
      <button id="repeat">⥀</button>
    </div>

    <!-- Elemento de audio -->
    <audio id="audio"></audio>
  </div>

  <script>
    /*************************************************************
     * 1) CORAZÓN CENTRAL PULSANTE Y LLUVIA DE CORAZONES
     *************************************************************/
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Ajustar canvas al redimensionar
    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Dimensiones base del corazón (más grande)
    let baseCupWidth = 300;
    let baseCupHeight = 270;

    // Llenado de 0 (vacío) a 1 (lleno)
    let fillFraction = 0;

    // Tiempo para el latido
    let beatTime = 0;

    // Función que retorna un Path2D en forma de corazón
    function getHeartPath(x, y, width, height) {
      const path = new Path2D();
      const topCurveHeight = height * 0.3;
      path.moveTo(x, y + topCurveHeight);
      // Curva izquierda superior
      path.bezierCurveTo(
        x, y,
        x - width / 2, y,
        x - width / 2, y + topCurveHeight
      );
      // Lado izquierdo y parte inferior
      path.bezierCurveTo(
        x - width / 2, y + (height + topCurveHeight) / 2,
        x, y + (height + topCurveHeight) / 2,
        x, y + height
      );
      // Lado derecho y parte inferior
      path.bezierCurveTo(
        x, y + (height + topCurveHeight) / 2,
        x + width / 2, y + (height + topCurveHeight) / 2,
        x + width / 2, y + topCurveHeight
      );
      // Curva derecha superior
      path.bezierCurveTo(
        x + width / 2, y,
        x, y,
        x, y + topCurveHeight
      );
      path.closePath();
      return path;
    }

    // Corazones pequeños que caen
    let fallingHearts = [];

    // Dibuja un corazón pequeño
    function drawHeart(ctx, x, y, width, height, fillStyle) {
      ctx.fillStyle = fillStyle;
      const path = getHeartPath(x, y, width, height);
      ctx.fill(path);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Mover el corazón más arriba (restando un valor adicional)
      // Latido “realista” con doble pulso
      beatTime += 0.07;
      const scale =
        1 + 0.04 * Math.sin(beatTime) + 0.03 * Math.sin(2 * beatTime);

      const currentCupWidth = baseCupWidth * scale;
      const currentCupHeight = baseCupHeight * scale;

      // Ajuste de la posición (subimos ~80px)
      const currentCupX = canvas.width / 2;
      const currentCupY = canvas.height / 2 - currentCupHeight / 2 - 80;

      // Generar nuevos corazones pequeños
      if (Math.random() < 0.1) {
        const size = Math.random() * 10 + 10; // Tamaño aleatorio
        fallingHearts.push({
          x: Math.random() * canvas.width,
          y: -size,
          size: size,
          speed: Math.random() * 2 + 2
        });
      }

      // Actualizar y dibujar corazones pequeños
      for (let i = fallingHearts.length - 1; i >= 0; i--) {
        const heart = fallingHearts[i];
        heart.y += heart.speed;
        drawHeart(ctx, heart.x, heart.y - heart.size / 2, heart.size, heart.size, "pink");

        // Verificar si cae dentro del corazón principal
        const cupPath = getHeartPath(currentCupX, currentCupY, currentCupWidth, currentCupHeight);
        if (ctx.isPointInPath(cupPath, heart.x, heart.y)) {
          // Límite superior del relleno
          const fillSurface =
            currentCupY + currentCupHeight - currentCupHeight * fillFraction;
          if (heart.y + heart.size / 2 >= fillSurface) {
            // Aumenta el nivel de llenado
            fillFraction += (heart.size * 0.8) / currentCupHeight;
            if (fillFraction > 1) fillFraction = 1;
            fallingHearts.splice(i, 1);
            continue;
          }
        }
        // Eliminar corazón si sale de pantalla
        if (heart.y - heart.size > canvas.height) {
          fallingHearts.splice(i, 1);
        }
      }

      // Dibujar relleno del corazón (en tonos morados)
      const cupPath = getHeartPath(currentCupX, currentCupY, currentCupWidth, currentCupHeight);
      ctx.save();
      ctx.clip(cupPath);
      ctx.fillStyle = "#8e44ad";
      const fillHeight = currentCupHeight * fillFraction;
      ctx.fillRect(
        currentCupX - currentCupWidth / 2,
        currentCupY + currentCupHeight - fillHeight,
        currentCupWidth,
        fillHeight
      );
      ctx.restore();

      // Contorno con sombra
      ctx.shadowColor = "#bb8fce";
      ctx.shadowBlur = 15;
      ctx.strokeStyle = "#9b59b6";
      ctx.lineWidth = 5;
      ctx.stroke(cupPath);
      ctx.shadowBlur = 0;

      requestAnimationFrame(animate);
    }
    animate();

    // Al hacer click en "Clica aquí <3", ocultar el link y mostrar "te amo"
    const centerLink = document.getElementById("center-link");
    const loveMessage = document.getElementById("love-message");
    centerLink.addEventListener("click", (event) => {
      // Si NO quieres abrir la URL de Drive, descomenta la siguiente línea:
      // event.preventDefault();
      centerLink.style.display = "none"; // Ocultar el link
      loveMessage.style.display = "block"; // Mostrar "te amo"
    });

    /*************************************************************
     * 2) REPRODUCTOR DE MÚSICA (TONOS MORADOS)
     *************************************************************/
    const audio = document.getElementById("audio");

    // Elementos de la interfaz
    const songNameEl = document.getElementById("song-name");
    const artistNameEl = document.getElementById("artist-name");
    const likeBtn = document.getElementById("like-btn");
    const shuffleBtn = document.getElementById("shuffle");
    const prevBtn = document.getElementById("prev");
    const playPauseBtn = document.getElementById("play-pause");
    const nextBtn = document.getElementById("next");
    const repeatBtn = document.getElementById("repeat");
    const progressBar = document.getElementById("progress-bar");
    const currentTimeEl = document.getElementById("current-time");
    const durationEl = document.getElementById("duration");

    // Configuración de pistas (ejemplo). Agrega las tuyas con name, artist, src.
    const trackList = [
      {
        name: "Vance Joy - Riptide",
        artist: "",
        src: "Vance Joy - Riptide.mp3"
      },
      {
        name: "Arctic Monkeys - 505",
        artist: "",
        src: "Arctic Monkeys - 505.mp3"
      },
      {
        name: "This Side Of Paradise",
        artist: "",
        src: "This Side Of Paradise.mp3"
      },
      {
        name: "The look of love",
        artist: "",
        src: "The look of love.mp3"
      },
      {
        name: "Apocalypse",
        artist: "",
        src: "Apocalypse.mp3"
      },
      // Agrega más pistas si lo deseas
    ];

    let currentTrackIndex = 0;
    let isPlaying = false;
    let isLiked = false;
    let isShuffle = false;
    let isRepeat = false;

    // Cargar la pista en el reproductor
    function loadTrack(index) {
      const track = trackList[index];
      audio.src = track.src;
      songNameEl.textContent = track.name;
      artistNameEl.textContent = track.artist;
      updateLike(false); // reiniciamos el "like" cuando cambia de canción
    }

    // Reproducir la pista actual
    function playTrack() {
      audio.play();
      isPlaying = true;
      playPauseBtn.textContent = "⏸"; // Cambiamos el icono a pausa
    }

    // Pausar la pista actual
    function pauseTrack() {
      audio.pause();
      isPlaying = false;
      playPauseBtn.textContent = "▶"; // Cambiamos el icono a play
    }

    // Cambiar estado de “like”
    function updateLike(force) {
      if (typeof force === "boolean") {
        isLiked = force;
      } else {
        isLiked = !isLiked;
      }
      likeBtn.classList.toggle("liked", isLiked);
    }

    // Función para dar formato mm:ss a los segundos
    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ":" + (s < 10 ? "0" + s : s);
    }

    // Actualizar la barra de progreso y tiempos
    function updateProgress() {
      if (!audio.duration) return;
      const current = audio.currentTime;
      const percent = (current / audio.duration) * 100;
      progressBar.value = percent;

      // Actualizar tiempo actual y duración
      currentTimeEl.textContent = formatTime(current);
      durationEl.textContent = formatTime(audio.duration);
    }

    // Saltar a un punto específico al arrastrar la barra
    function seek(e) {
      const percent = e.target.value;
      audio.currentTime = (percent / 100) * audio.duration;
    }

    // Pasar a la siguiente pista
    function nextTrack() {
      if (isShuffle) {
        // Shuffle: elige una pista aleatoria distinta a la actual
        let randomIndex;
        do {
          randomIndex = Math.floor(Math.random() * trackList.length);
        } while (randomIndex === currentTrackIndex && trackList.length > 1);
        currentTrackIndex = randomIndex;
      } else {
        currentTrackIndex++;
        if (currentTrackIndex >= trackList.length) currentTrackIndex = 0;
      }
      loadTrack(currentTrackIndex);
      playTrack();
    }

    // Pasar a la pista anterior
    function prevTrack() {
      currentTrackIndex--;
      if (currentTrackIndex < 0) currentTrackIndex = trackList.length - 1;
      loadTrack(currentTrackIndex);
      playTrack();
    }

    // Al terminar la pista
    audio.addEventListener("ended", () => {
      if (isRepeat) {
        // Repetir la misma pista
        audio.currentTime = 0;
        playTrack();
      } else {
        // Pasar a la siguiente
        nextTrack();
      }
    });

    // Eventos de la interfaz
    playPauseBtn.addEventListener("click", () => {
      isPlaying ? pauseTrack() : playTrack();
    });
    nextBtn.addEventListener("click", nextTrack);
    prevBtn.addEventListener("click", prevTrack);

    likeBtn.addEventListener("click", () => {
      updateLike();
    });

    shuffleBtn.addEventListener("click", () => {
      isShuffle = !isShuffle;
      shuffleBtn.classList.toggle("active-control", isShuffle);
    });

    repeatBtn.addEventListener("click", () => {
      isRepeat = !isRepeat;
      repeatBtn.classList.toggle("active-control", isRepeat);
    });

    progressBar.addEventListener("input", seek);
    audio.addEventListener("timeupdate", updateProgress);

    // Inicializar (cargar la primera pista)
    if (trackList.length > 0) {
      loadTrack(currentTrackIndex);
    }
  </script>
</body>
</html>
